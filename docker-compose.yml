services:
  redis:
    image: redis:7-alpine
    container_name: monitor-toner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  monitor-toner:
    build: .
    container_name: monitor-toner
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      - TZ=America/Sao_Paulo
      # ⚠️ OBRIGATÓRIO: Definir senha admin com hash bcrypt
      # Gere com: python3 -c "import bcrypt; print(bcrypt.hashpw(b'SENHA_SEGURA', bcrypt.gensalt(rounds=12)).decode())"
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:?Erro: ADMIN_PASSWORD_HASH não definido}
      # URL de conexão com Redis (compartilhada com app)
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "80:5000"     # acessa pelo http://localhost
    # ATENÇÃO: network_mode: host NÃO funciona no Windows/Mac
    # No Linux (servidor), substitua "ports" por:
    # network_mode: host
    # (necessário para o SNMP alcançar as impressoras na rede)

volumes:
  redis_data:
