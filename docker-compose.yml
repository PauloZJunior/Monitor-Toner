services:
  redis:
    image: redis:7-alpine
    container_name: monitor-toner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  monitor-toner:
    build: .
    env_file:
      - .env
    container_name: monitor-toner
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      - TZ=America/Sao_Paulo
      # ⚠️ OBRIGATÓRIO: Definir senha admin com hash bcrypt
      # Gere com: python3 -c "import bcrypt; print(bcrypt.hashpw(b'SENHA_SEGURA', bcrypt.gensalt(rounds=12)).decode())"
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      # URL de conexão com Redis (compartilhada com app)
      - REDIS_URL=redis://redis:6379/0
    networks:
      - default
      - trefik
    
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.monitor.rule=Host(`monitortoner-pssm`)"
      - "traefik.http.routers.monitor.entrypoints=websecure"
      - "traefik.http.routers.monitor.tls=true"
      - "traefik.http.services.monitor.loadbalancer.server.port=5000"
    #ports:
    # - "5000:5000"     # acessa pelo http://localhost
    # ATENÇÃO: network_mode: host NÃO funciona no Windows/Mac
    # No Linux (servidor), substitua "ports" por:
    # network_mode: host
    # (necessário para o SNMP alcançar as impressoras na rede)

volumes:
  redis_data:

networks:
  trefik:
    external: true
